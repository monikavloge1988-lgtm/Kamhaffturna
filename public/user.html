<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament App</title>
    <!-- Keep the exact styling provided by the user -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{
            --bg:#000;--bg2:#050510;--bg3:#0a0a20;
            --card:#0d0d1a;--card2:#111128;
            --accent:#00f5ff;--accent2:#ff00ff;--accent3:#ffcc00;
            --gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
            --green:#00ff88;--red:#ff3366;
            --text:#e0e0ff;--text2:#8888aa;
            --border:rgba(0,245,255,0.2);
            --glow:0 0 20px rgba(0,245,255,0.4);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;}
        
        .page{display:none;flex-direction:column;height:100%;overflow:hidden;}
        .page.active{display:flex;}
        .mcont{flex:1;overflow-y:auto;padding:20px;padding-bottom:80px;text-align:center;}
        
        .auth-box { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; max-width: 400px; margin: 40px auto; }
        .auth-box h2 { font-family: 'Orbitron'; color: var(--accent); margin-bottom: 20px; }
        .inp-w { margin-bottom: 15px; position: relative; }
        .inp-w input { width: 100%; padding: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: #fff; }
        .btn-main { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Orbitron'; }
        
        .top-bar { display:flex; justify-content: space-between; padding: 15px; background: var(--card); border-bottom: 1px solid var(--border); }
        .bot-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display:flex; padding: 15px; justify-content: space-around; border-top: 1px solid var(--border); }
        .nav-it { cursor: pointer; color: var(--text2); display:flex; flex-direction: column; align-items: center; font-size: 12px; }
        .nav-it.active { color: var(--accent); }
        
        .t-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; }
        .t-card h3 { color: var(--accent); font-family: 'Orbitron'; margin-bottom: 10px; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; display: none; z-index: 1000; }
        .toast.show { display: block; }
    </style>
</head>
<body>

    <!-- AUTH PAGE -->
    <div id="auth-page" class="page active">
        <div class="mcont">
            <div class="auth-box">
                <h2>🏆 TOURNAMENT LOGIN</h2>
                <div id="login-form">
                    <div class="inp-w"><input type="email" id="li-email" placeholder="Email Address"></div>
                    <div class="inp-w"><input type="password" id="li-pass" placeholder="Password"></div>
                    <button class="btn-main" onclick="doLogin()">⚡ LOGIN</button>
                    <p style="margin-top: 15px; cursor: pointer; color: var(--accent2)" onclick="toggleAuth()">Don't have an account? Sign up</p>
                </div>
                <div id="signup-form" style="display: none;">
                    <div class="inp-w"><input type="text" id="su-fname" placeholder="First Name"></div>
                    <div class="inp-w"><input type="text" id="su-lname" placeholder="Last Name"></div>
                    <div class="inp-w"><input type="text" id="su-uname" placeholder="Username"></div>
                    <div class="inp-w"><input type="email" id="su-email" placeholder="Email Address"></div>
                    <div class="inp-w"><input type="password" id="su-pass" placeholder="Password"></div>
                    <button class="btn-main" onclick="doSignup()">⚡ SIGNUP</button>
                    <p style="margin-top: 15px; cursor: pointer; color: var(--accent2)" onclick="toggleAuth()">Already have an account? Login</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP PAGE -->
    <div id="main-page" class="page">
        <div class="top-bar">
            <div><b id="user-name">User</b> <span id="user-bal" style="color: var(--accent3)">₹0</span></div>
            <div onclick="doLogout()" style="cursor: pointer; color: var(--red)">Logout</div>
        </div>
        
        <div class="mcont">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">🎮 TOURNAMENTS</h2>
            <div id="t-list">Loading tournaments...</div>
        </div>
        
        <div class="bot-nav">
            <div class="nav-it active"><i class="fas fa-home"></i> Home</div>
            <div class="nav-it" onclick="alert('Wallet coming soon!')"><i class="fas fa-wallet"></i> Wallet</div>
            <div class="nav-it" onclick="alert('Profile coming soon!')"><i class="fas fa-user"></i> Profile</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;

        // Auto login check
        if (localStorage.getItem('uid')) {
            loadUser(localStorage.getItem('uid'));
        }

        function toggleAuth() {
            const lf = document.getElementById('login-form');
            const sf = document.getElementById('signup-form');
            if (lf.style.display === 'none') {
                lf.style.display = 'block';
                sf.style.display = 'none';
            } else {
                lf.style.display = 'none';
                sf.style.display = 'block';
            }
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function doLogin() {
            const email = document.getElementById('li-email').value;
            const pass = document.getElementById('li-pass').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password: pass})
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('uid', data.user.uid);
                    currentUser = data.user;
                    showMain();
                } else {
                    toast(data.error);
                }
            } catch (err) { toast('Connection error'); }
        }

        async function doSignup() {
            const firstName = document.getElementById('su-fname').value;
            const lastName = document.getElementById('su-lname').value;
            const username = document.getElementById('su-uname').value;
            const email = document.getElementById('su-email').value;
            const password = document.getElementById('su-pass').value;
            
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({firstName, lastName, username, email, password})
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('uid', data.user.uid);
                    currentUser = data.user;
                    showMain();
                } else {
                    toast(data.error);
                }
            } catch (err) { toast('Connection error'); }
        }

        async function loadUser(uid) {
            try {
                const res = await fetch('/api/users/' + uid);
                const data = await res.json();
                if (data.success) {
                    currentUser = data.user;
                    showMain();
                }
            } catch (err) {}
        }

        function doLogout() {
            localStorage.removeItem('uid');
            currentUser = null;
            document.getElementById('main-page').classList.remove('active');
            document.getElementById('auth-page').classList.add('active');
        }

        function showMain() {
            document.getElementById('auth-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            
            document.getElementById('user-name').innerText = currentUser.displayName;
            document.getElementById('user-bal').innerText = '₹' + currentUser.balance;
            
            loadTournaments();
        }

        async function loadTournaments() {
            const list = document.getElementById('t-list');
            list.innerHTML = 'Loading...';
            try {
                const res = await fetch('/api/tournaments');
                const data = await res.json();
                list.innerHTML = '';
                if (data.tournaments.length === 0) list.innerHTML = 'No tournaments found.';
                data.tournaments.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 't-card';
                    div.innerHTML = `
                        <h3>${t.name}</h3>
                        <p>Entry: ₹${t.entry_fee} | Prize: ₹${t.prize_pool}</p>
                        <p>Status: ${t.status.toUpperCase()}</p>
                        <button class="btn-main" style="margin-top:10px" onclick="joinTourn('${t.id}')">JOIN NOW</button>
                    `;
                    list.appendChild(div);
                });
            } catch (err) { list.innerHTML = 'Failed to load.'; }
        }

        async function joinTourn(id) {
            if (!confirm('Join tournament? Entry fee will be deducted.')) return;
            try {
                const res = await fetch('/api/tournaments/join', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({uid: currentUser.uid, tournamentId: id, gameName: 'Test', gameId: '123', seatNumber: 1})
                });
                const data = await res.json();
                if (data.success) {
                    toast('Joined Successfully!');
                    currentUser.balance = data.newBalance;
                    document.getElementById('user-bal').innerText = '₹' + currentUser.balance;
                } else {
                    toast(data.error);
                }
            } catch (err) { toast('Error parsing request'); }
        }
    </script>
</body>
</html>
